name: Deploy Ansible Container

on:
  push:
    branches:
      - main
    paths:
      - "ansible-playbook/**"

env:
  AWS_REGION: ap-northeast-1
  AWS_ECR_ANSIBLE_REPOSITORY: ansible-container
  ANSIBLE_IMAGE_NAME: ansible-eksctl-client-server-provisioner
  TEST_TAG: ansible-eksctl-client-server-provisioner:test

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build-ansible-image:
    name: Build Ansible Container
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
        working-directory: ./ansible-playbook

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and export to Docker
        uses: docker/build-push-action@v7
        with:
          context: ./ansible-playbook
          target: installed
          load: true
          tags: ${{ env.TEST_TAG }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/${{ env.ANSIBLE_IMAGE_NAME }}:buildcache
          cache-to: type=local,dest=/tmp/.buildx-cache
          provenance: false

      - name: Test
        run: |
          docker run --rm ${{ env.TEST_TAG }} make syntax-check

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_ANSIBLE_REPOSITORY }}/${{ env.ANSIBLE_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./ansible-playbook
          target: installed
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/${{ env.ANSIBLE_IMAGE_NAME }}:buildcache,mode=max
          provenance: false
